<!DOCTYPE html><html lang="en"><head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>Kayify</title> <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" /> <style> :root { --bg: #1E1E1E; --surface: #272727; --surface2: #2F2F2F; --sage: #A8B89E; --sage-dim: #7A9070; --pink: #D4919A; --pink-dim: #A8656E; --text: #F0EDE8; --text-muted:#8A8A8A; --border: rgba(255,255,255,0.07); --radius: 14px; } * { margin: 0; padding: 0; box-sizing: border-box; } body { background-color: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 400; min-height: 100vh; display: flex; flex-direction: column; align-items: center; } header { width: 100%; max-width: 680px; padding: 52px 24px 0; text-align: center; } .logo { font-family: 'DM Serif Display', serif; font-size: 48px; letter-spacing: -1px; color: var(--text); } .logo span { color: var(--pink); } .tagline { margin-top: 10px; font-size: 14px; color: var(--text-muted); font-weight: 300; letter-spacing: 0.3px; } main { width: 100%; max-width: 680px; padding: 40px 24px; } .input-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; } .input-wrap textarea { width: 100%; background: transparent; border: none; outline: none; resize: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 300; line-height: 1.7; padding: 22px 24px 12px; caret-color: var(--pink); } .input-wrap textarea::placeholder { color: var(--text-muted); font-style: italic; } .input-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px 16px; border-top: 1px solid var(--border); } .char-count { font-size: 12px; color: var(--text-muted); } #genBtn { background: var(--pink); color: #fff; border: none; border-radius: 8px; padding: 10px 22px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s, transform 0.15s; } #genBtn:hover { background: var(--pink-dim); } #genBtn:active { transform: scale(0.97); } #genBtn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; } #results { width: 100%; max-width: 680px; padding: 0 24px 60px; } .results-inner { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 28px; } .loading-state { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px 0; color: var(--text-muted); font-size: 14px; } .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--sage); border-radius: 50%; animation: spin 0.8s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } } .mood-label-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; } .mood-pill { background: var(--pink); color: #fff; font-size: 12px; font-weight: 500; padding: 4px 14px; border-radius: 20px; } .mood-energy { font-size: 12px; color: var(--sage); border: 1px solid var(--sage-dim); padding: 4px 12px; border-radius: 20px; } .mood-summary { font-size: 15px; color: var(--text-muted); font-weight: 300; line-height: 1.65; margin-bottom: 20px; } .genre-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; } .genre-tag { font-size: 12px; background: var(--surface2); color: var(--sage); padding: 5px 14px; border-radius: 20px; border: 1px solid rgba(168,184,158,0.2); } .track-list { display: flex; flex-direction: column; gap: 0; } .track { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid var(--border); } .track:last-child { border-bottom: none; } .track-num { font-size: 12px; color: var(--text-muted); width: 18px; text-align: right; flex-shrink: 0; } .track-info { flex: 1; } .track-name { font-size: 14px; font-weight: 500; color: var(--text); } .track-artist { font-size: 13px; color: var(--text-muted); margin-top: 2px; font-weight: 300; } .track-duration { font-size: 12px; color: var(--text-muted); } .retry-btn { margin-top: 24px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 9px 18px; border-radius: 8px; cursor: pointer; transition: color 0.2s, border-color 0.2s; } .retry-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); } </style></head><body> <header> <div class="logo">Kay<span>ify</span></div> <p class="tagline">tell us how you feel. we'll find the sound.</p> </header> <main> <div class="input-wrap"> <textarea id="moodInput" placeholder="i'm feeling kind of nostalgic and slow today..." maxlength="200" rows="4" ></textarea> <div class="input-footer"> <span class="char-count"><span id="charCount">0</span> / 200</span> <button id="genBtn" onclick="generatePlaylist()">find my sound →</button> </div> </div> </main> <section id="results" style="display:none;"> <div class="results-inner"> <div id="loadingState" class="loading-state"> <div class="spinner"></div> <p>reading the room...</p> </div> <div id="resultContent" style="display:none;"> <div class="mood-label-row"> <span class="mood-pill" id="moodPill"></span> <span class="mood-energy" id="moodEnergy"></span> </div> <p class="mood-summary" id="moodSummary"></p> <div class="genre-tags" id="genreTags"></div> <div class="track-list" id="trackList"></div> <button class="retry-btn" onclick="resetApp()">← try a different mood</button> </div> </div> </section> <script> const input = document.getElementById('moodInput'); const counter = document.getElementById('charCount'); const btn = document.getElementById('genBtn'); const results = document.getElementById('results'); const loading = document.getElementById('loadingState'); const content = document.getElementById('resultContent'); input.addEventListener('input', () => { counter.textContent = input.value.length; }); async function generatePlaylist() { const mood = input.value.trim(); if (!mood) return; btn.disabled = true; results.style.display = 'block'; loading.style.display = 'flex'; content.style.display = 'none'; results.scrollIntoView({ behavior: 'smooth', block: 'start' }); const prompt = `You are a music curator for an app called Kayify. A user typed how they feel: "${mood}"Respond ONLY in valid JSON with this exact structure, no extra text:{ "moodLabel": "one or two word mood name", "energyLevel": "low energy" or "mid energy" or "high energy", "summary": "one sent
