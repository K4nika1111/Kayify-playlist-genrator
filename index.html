<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kayify - Playlist Generator</title>
  <style>
    :root {
      --bg: #1e1e1e;
      --surface: #272727;
      --surface-hover: #2f2f2f;
      --primary: #d4919a; /* Your pink back as main accent */
      --accent: #a8b89e;  /* Your sage green for highlights */
      --accent-dim: #7a9070;
      --text-main: #f0ede8;
      --text-sub: #8a8a8a;
      --border-color: rgba(255, 255, 255, 0.07);
      --border-radius: 14px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 640px;
      padding: 60px 20px 20px;
      text-align: center;
    }

    .logo {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .logo span {
      color: var(--primary);
    }

    .tagline {
      margin-top: 8px;
      font-size: 14px;
      color: var(--text-sub);
    }

    main {
      width: 100%;
      max-width: 640px;
      padding: 20px;
    }

    .input-wrap {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
    }

    .input-wrap textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text-main);
      font-size: 15px;
      padding: 20px;
      line-height: 1.5;
    }

    .input-wrap textarea::placeholder {
      color: var(--text-sub);
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid var(--border-color);
    }

    .char-count {
      font-size: 12px;
      color: var(--text-sub);
    }

    #genBtn {
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #genBtn:disabled {
      background: var(--surface-hover);
      color: var(--text-sub);
      cursor: not-allowed;
    }

    #results {
      width: 100%;
      max-width: 640px;
      padding: 0 20px 40px;
    }

    .results-inner {
      background: var(--surface);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 24px;
    }

    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 0;
      color: var(--text-sub);
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-color);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }

    .mood-meta {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .badge-pink {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--primary);
      color: #fff;
    }

    .badge-green {
      font-size: 11px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
    }

    .mood-summary {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .track-list {
      margin-top: 20px;
    }

    .track {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .track:last-child { 
      border-bottom: none; 
    }

    .track-meta {
      display: flex;
      flex-direction: column;
    }

    .track-title {
      font-size: 14px;
      font-weight: 600;
    }

    .track-artist {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 2px;
    }

    .track-duration {
      font-size: 12px;
      color: var(--text-sub);
    }

    .btn-reset {
      margin-top: 20px;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-sub);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-reset:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text-main);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Kay<span>ify</span></div>
    <p class="tagline">Enter your mood to generate a custom playlist.</p>
  </header>

  <main>
    <div class="input-wrap">
      <textarea
        id="moodInput"
        placeholder="How are you feeling right now?"
        maxlength="200"
        rows="4"
      ></textarea>
      <div class="input-footer">
        <span class="char-count"><span id="charCount">0</span> / 200</span>
        <button id="genBtn" onclick="generatePlaylist()">Generate</button>
      </div>
    </div>
  </main>

  <section id="results" style="display:none;">
    <div class="results-inner">
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <span>Analyzing mood...</span>
      </div>

      <div id="resultContent" style="display:none;">
        <div class="mood-meta">
          <span class="badge-pink" id="moodPill"></span>
          <span class="badge-green" id="moodEnergy"></span>
        </div>
        <p class="mood-summary" id="moodSummary"></p>
        <div class="track-list" id="trackList"></div>
        <button class="btn-reset" onclick="resetApp()">Try another mood</button>
      </div>
    </div>
  </section>

  <script>
    const input = document.getElementById('moodInput');
    const counter = document.getElementById('charCount');
    const btn = document.getElementById('genBtn');
    const resultsContainer = document.getElementById('results');
    const loadingState = document.getElementById('loadingState');
    const resultContent = document.getElementById('resultContent');

    input.addEventListener('input', () => {
      counter.textContent = input.value.length;
    });

    async function generatePlaylist() {
      const val = input.value.trim();
      if (!val) return;

      btn.disabled = true;
      resultsContainer.style.display = 'block';
      loadingState.style.display = 'flex';
      resultContent.style.display = 'none';

      try {
        // Humanized, finished version of the system prompt layout
        const systemPrompt = `You are a music playlist generator. Based on this mood: "${val}", return a valid JSON object. Do not include markdown formatting or backticks.
        Structure:
        {
          "moodLabel": "string",
          "energyLevel": "string",
          "summary": "string",
          "tracks": [{"title": "string", "artist": "string", "duration": "string"}]
        }`;

        // Standard mock data setup that developers use for frontend testing
        setTimeout(() => {
          const mockData = {
            moodLabel: "Nostalgic",
            energyLevel: "Low Energy",
            summary: "Perfect background tracklist for a slow, introspective day.",
            tracks: [
              { title: "Come Back to Earth", artist: "Mac Miller", duration: "2:42" },
              { title: "Melrose", artist: "Childish Gambino", duration: "2:04" },
              { title: "Sextape", artist: "Deftones", duration: "4:02" }
            ]
          };

          renderResults(mockData);
        }, 1500);

      } catch (err) {
        console.error("Failed to generate:", err);
        alert("Something went wrong. Please try again.");
        resetApp();
      }
    }

    function renderResults(data) {
      loadingState.style.display = 'none';
      resultContent.style.display = 'block';

      document.getElementById('moodPill').textContent = data.moodLabel;
      document.getElementById('moodEnergy').textContent = data.energyLevel;
      document.getElementById('moodSummary').textContent = data.summary;

      const trackList = document.getElementById('trackList');
      trackList.innerHTML = ''; 

      data.tracks.forEach(track => {
        const div = document.createElement('div');
        div.className = 'track';
        div.innerHTML = `
          <div class="track-meta">
            <span class="track-title">${track.title}</span>
            <span class="track-artist">${track.artist}</span>
          </div>
          <span class="track-duration">${track.duration}</span>
        `;
        trackList.appendChild(div);
      });
    }

    function resetApp() {
      input.value = '';
      counter.textContent = '0';
      btn.disabled = false;
      resultsContainer.style.display = 'none';
    }
  </script>
</body>
</html>
